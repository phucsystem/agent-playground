services:
  # --- Development ---
  app-dev:
    build:
      context: .
      target: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file: .env
    profiles: ["dev"]

  # --- Production ---
  app:
    build:
      context: .
      target: production
    ports:
      - "3000:3000"
    env_file: .env
    restart: unless-stopped
    profiles: ["prod"]
